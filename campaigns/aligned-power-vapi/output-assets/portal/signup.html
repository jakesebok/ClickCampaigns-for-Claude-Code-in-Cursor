<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Aligned Power Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --ap-primary: #582233;
      --ap-secondary: #334750;
      --ap-accent: #D4AA70;
      --ap-bg: #F4ECE3;
      --ap-text: #582233;
      --ap-muted: #C6B8A7;
      --ap-border: #C6B8A7;
    }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--ap-bg); color: var(--ap-text); }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <main class="max-w-md mx-auto px-4 pt-16 pb-12">
    <div class="text-center mb-8">
      <h1 class="text-3xl text-[var(--ap-primary)] mb-2">Aligned Power Portal</h1>
      <p class="text-[var(--ap-secondary)]">Create an account to view and track your VAPI™ results over time.</p>
    </div>
    <div class="bg-white rounded-2xl border border-[var(--ap-border)] shadow-lg p-6 sm:p-8">
      <form id="signup-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
          <p class="text-xs text-[var(--ap-muted)] mt-1">Use the same email you use when taking the assessment so your results appear here.</p>
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
          <p class="text-xs text-[var(--ap-muted)] mt-1">At least 6 characters.</p>
        </div>
        <p id="signup-error" class="text-sm text-red-600 hidden"></p>
        <button type="submit" class="w-full bg-[var(--ap-primary)] hover:bg-[#461b2a] text-white font-semibold py-3 px-4 rounded-xl transition-colors">
          Create account
        </button>
      </form>
      <p class="text-sm text-[var(--ap-muted)] mt-6 text-center">
        Already have an account? <a href="login.html" id="login-link" class="font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Log in</a>
      </p>
    </div>
    <p class="text-center mt-6">
      <a href="../html/vapi-landing.html" class="text-sm text-[var(--ap-muted)] hover:text-[var(--ap-primary)]">← Back to assessment</a>
    </p>
  </main>
  <script type="module">
    (async function() {
      async function loadConfig() {
        try {
          var r = await fetch('/api/config');
          if (!r.ok) return { error: 'fetch_failed' };
          var t = await r.text();
          eval(t);
          if (!window.SUPABASE_URL) return { error: 'empty_config' };
          return {};
        } catch (e) {
          return { error: 'fetch_failed' };
        }
      }
      var errEl = document.getElementById('signup-error');
      var cfg = await loadConfig();
      if (cfg.error === 'fetch_failed') {
        errEl.textContent = 'Portal config could not be loaded. If you run this site: set Vercel Root Directory to the folder that contains the api folder, add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables, then redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      if (cfg.error === 'empty_config') {
        errEl.textContent = 'Supabase URL is not set. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables and redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      var { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
      var supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var session = await supabase.auth.getSession();
      if (session.data.session) {
        window.location.href = 'dashboard.html';
        return;
      }
      var signupParams = new URLSearchParams(window.location.search);
      var emailParam = signupParams.get('email');
      if (emailParam) document.getElementById('email').value = emailParam;
      var loginLink = document.getElementById('login-link');
      if (loginLink && emailParam) loginLink.href = 'login.html?email=' + encodeURIComponent(emailParam);
      document.getElementById('signup-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errEl = document.getElementById('signup-error');
        errEl.classList.add('hidden');
        var redirectTo = window.location.origin + '/portal/confirm.html';
        var { data, error } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: redirectTo } });
        if (error) {
          errEl.textContent = error.message || 'Sign up failed.';
          errEl.classList.remove('hidden');
          return;
        }
        window.location.href = 'check-email.html';
      });
    })();
  </script>
</body>
</html>
