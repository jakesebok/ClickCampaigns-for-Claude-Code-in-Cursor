<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/portal/theme-init.js"></script>
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Aligned Performance Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --ap-primary: #0E1624;
      --ap-secondary: #3A4A5C;
      --ap-accent: #FF6B1A;
      --ap-bg: #F5F7FA;
      --ap-text: #0E1624;
      --ap-muted: #7A8FA8;
      --ap-border: #DDE3ED;
    }
    [data-theme="dark"]{--ap-primary:#e8eaf2;--ap-secondary:#b8c4d4;--ap-accent:#FF6B1A;--ap-bg:#161b26;--ap-text:#e8eaf2;--ap-muted:#8a9bb3;--ap-border:#2d3849;--ap-surface:#1e2438;}
    [data-theme="dark"] .bg-white{background-color:var(--ap-surface)!important;}
    body { font-family: 'Cormorant Garamond', serif; font-weight: 600; background: linear-gradient(165deg, var(--ap-bg) 0%, color-mix(in srgb, #0E1624 5%, var(--ap-bg)) 40%, color-mix(in srgb, #FF6B1A 4%, var(--ap-bg)) 100%); background-attachment: fixed; color: var(--ap-text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: -0.02em; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <main class="max-w-md mx-auto px-4 pt-16 pb-12">
    <div class="text-center mb-8">
      <a href="/dashboard" class="inline-block mb-4">
        <img src="../images/logo-jake-sebok-horizontal.png" alt="Jake Sebok" class="h-12 sm:h-14 w-auto mx-auto" />
      </a>
      <h1 class="text-3xl text-[var(--ap-primary)] mb-2">Aligned Performance Portal</h1>
      <p class="text-[var(--ap-secondary)]">Create an account to view and track your VAPI™ results over time.</p>
    </div>
    <div class="bg-white rounded-2xl border border-[var(--ap-border)] shadow-lg p-6 sm:p-8 border-l-4 border-l-[var(--ap-accent)]">
      <form id="signup-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
          <p class="text-xs text-[var(--ap-muted)] mt-1">Use the same email you use when taking the assessment so your results appear here.</p>
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
          <p class="text-xs text-[var(--ap-muted)] mt-1">At least 6 characters.</p>
        </div>
        <p id="signup-error" class="text-sm text-red-600 hidden"></p>
        <button type="submit" class="w-full bg-[var(--ap-accent)] hover:bg-[#e55a0f] text-white font-semibold py-3 px-4 rounded-[100px] transition-colors">
          Create account
        </button>
      </form>
      <p class="text-sm text-[var(--ap-muted)] mt-6 text-center">
        Already have an account? <a href="/login" id="login-link" class="font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Log in</a>
      </p>
    </div>
    <p class="text-center mt-6">
      <a href="/assessment" class="text-sm text-[var(--ap-muted)] hover:text-[var(--ap-primary)]">← Back to assessment</a>
    </p>
  </main>
  <script type="module">
    (async function() {
      async function loadConfig() {
        try {
          var r = await fetch('/api/config');
          if (!r.ok) return { error: 'fetch_failed' };
          var t = await r.text();
          eval(t);
          if (!window.SUPABASE_URL) return { error: 'empty_config' };
          return {};
        } catch (e) {
          return { error: 'fetch_failed' };
        }
      }
      var errEl = document.getElementById('signup-error');
      var cfg = await loadConfig();
      if (cfg.error === 'fetch_failed') {
        errEl.textContent = 'Portal config could not be loaded. If you run this site: set Vercel Root Directory to the folder that contains the api folder, add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables, then redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      if (cfg.error === 'empty_config') {
        errEl.textContent = 'Supabase URL is not set. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables and redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      var { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm');
      var supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var signupParams = new URLSearchParams(window.location.search);
      var redirect = signupParams.get('redirect') || '';
      var allowedRedirects = ['/dashboard', '/admin', '/settings', '/scorecard', '/coach', '/portal/driver-library', '/portal/archetype-library'];
      var redirectToAfterAuth = (allowedRedirects.indexOf(redirect) !== -1 || (redirect && redirect.startsWith('/coach/client'))) ? redirect : '/dashboard';
      var session = await supabase.auth.getSession();
      if (session.data.session) {
        window.location.href = redirectToAfterAuth;
        return;
      }
      var emailParam = signupParams.get('email');
      if (emailParam) document.getElementById('email').value = emailParam;
      var loginLink = document.getElementById('login-link');
      if (loginLink) {
        var loginHref = '/login';
        if (emailParam) loginHref += '?email=' + encodeURIComponent(emailParam);
        if (redirectToAfterAuth && redirectToAfterAuth !== '/dashboard') loginHref += (loginHref.indexOf('?') >= 0 ? '&' : '?') + 'redirect=' + encodeURIComponent(redirectToAfterAuth);
        loginLink.href = loginHref;
      }
      document.getElementById('signup-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errEl = document.getElementById('signup-error');
        errEl.classList.add('hidden');
        var confirmRedirect = 'https://portal.alignedpower.coach/confirm-email';
        if (redirectToAfterAuth && redirectToAfterAuth !== '/dashboard') {
          confirmRedirect += '?redirect=' + encodeURIComponent(redirectToAfterAuth);
        }
        var { data, error } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: confirmRedirect } });
        if (error) {
          errEl.textContent = error.message || 'Sign up failed.';
          errEl.classList.remove('hidden');
          return;
        }
        var nextHref = '/check-email?email=' + encodeURIComponent(email);
        if (redirectToAfterAuth && redirectToAfterAuth !== '/dashboard') {
          nextHref += '&redirect=' + encodeURIComponent(redirectToAfterAuth);
        }
        window.location.href = nextHref;
      });
    })();
  </script>
</body>
</html>
