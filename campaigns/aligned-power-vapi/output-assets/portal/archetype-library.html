<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/portal/theme-init.js"></script>
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archetype Library | Aligned Performance Portal</title>
  <meta name="description" content="Explore the 9 founder archetypes inside the Aligned Performance Portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/html/vapi-archetypes.js"></script>
  <script src="/html/vapi-drivers.js"></script>
  <script src="/html/vapi-archetype-library.js"></script>
  <style>
    :root {
      --ap-primary: #0E1624;
      --ap-secondary: #3A4A5C;
      --ap-accent: #FF6B1A;
      --ap-bg: #F5F7FA;
      --ap-text: #0E1624;
      --ap-muted: #7A8FA8;
      --ap-border: #DDE3ED;
      --ap-surface: #ffffff;
      --ap-header-bg: rgba(255,255,255,0.95);
    }
    [data-theme="dark"] {
      --ap-primary: #e8eaf2;
      --ap-secondary: #b8c4d4;
      --ap-accent: #FF6B1A;
      --ap-bg: #161b26;
      --ap-text: #e8eaf2;
      --ap-muted: #8a9bb3;
      --ap-border: #2d3849;
      --ap-surface: #1e2438;
      --ap-header-bg: rgba(30,36,56,0.95);
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(165deg, var(--ap-bg) 0%, color-mix(in srgb, var(--ap-primary) 6%, var(--ap-bg)) 35%, color-mix(in srgb, var(--ap-accent) 5%, var(--ap-bg)) 100%);
      background-attachment: fixed;
      color: var(--ap-text);
      min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: -0.02em; }
    html { scroll-behavior: smooth; }
    .surface { background: var(--ap-surface); }
    @media (max-width: 767px) {
      .nav-links-desk { display: none !important; }
      .nav-cta-bar { display: inline-flex !important; }
      [data-nav-role="client"] .nav-cta-bar, [data-nav-role="admin"] .nav-cta-bar { display: none !important; }
      .nav-hamburger { display: inline-flex !important; }
    }
    @media (min-width: 768px) {
      .nav-cta-bar { display: none !important; }
      .nav-hamburger { display: none !important; }
    }
    .nav-hamburger-panel { transform: translateX(100%); transition: transform 0.25s ease-out; }
    .nav-hamburger-panel.nav-open { transform: translateX(0); }
    .nav-hamburger-backdrop { opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-hamburger-backdrop.nav-open { opacity: 1; pointer-events: auto; }
    .nav-popover summary { list-style: none; }
    .nav-popover summary::-webkit-details-marker { display: none; }
    .nav-popover[open] .nav-popover-chevron { transform: rotate(180deg); }
    .portal-library-mobile-nav { display: block; }
    .portal-library-desktop-layout { display: block; }
    .portal-library-desktop-sidebar { display: none; }
    .portal-library-desktop-sections { min-width: 0; }
    .portal-library-sidebar-sticky { position: sticky; top: 6rem; }
    @media (min-width: 768px) {
      .portal-library-mobile-nav { display: none; }
      .portal-library-desktop-layout {
        display: grid;
        gap: 2rem;
        grid-template-columns: 260px minmax(0, 1fr);
        align-items: start;
      }
      .portal-library-desktop-sidebar { display: block; align-self: start; }
    }
  </style>
</head>
<body class="min-h-screen antialiased">
  <header id="portal-header" class="border-b-2 border-[var(--ap-accent)]/30 bg-white/95 backdrop-blur-sm sticky top-0 z-10 shadow-sm" data-nav-role="nonclient">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/dashboard" class="inline-flex items-center gap-2.5 font-semibold text-[var(--ap-primary)] hover:opacity-90 transition-opacity">
        <img src="../images/favicon.svg" alt="" class="h-8 sm:h-9 w-auto" />
        <span>Aligned Performance Portal</span>
      </a>
      <div class="flex items-center gap-4">
        <button type="button" id="theme-toggle" class="p-2 rounded-lg text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] transition-colors" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i data-lucide="sun" id="theme-icon-light" class="w-5 h-5 hidden"></i>
          <i data-lucide="moon" id="theme-icon-dark" class="w-5 h-5"></i>
        </button>
        <a href="/assessment" class="nav-cta-bar hidden text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Take Assessment</a>
        <div class="nav-links-desk flex items-center gap-4">
          <a id="header-6c-link" href="/scorecard" class="hidden text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">6C's Scorecard</a>
          <details class="nav-popover relative">
            <summary class="inline-flex cursor-pointer items-center gap-1 text-sm font-semibold text-[var(--ap-accent)] transition-colors">
              Explore
              <i data-lucide="chevron-down" class="nav-popover-chevron w-4 h-4 transition-transform duration-200"></i>
            </summary>
            <div class="absolute right-0 top-full mt-3 w-56 rounded-2xl border border-[var(--ap-border)] bg-white/95 p-2 shadow-lg backdrop-blur-sm">
              <a href="/portal/archetype-library" class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-[var(--ap-accent)] bg-[var(--ap-bg)]">Archetype Library</a>
              <a href="/portal/driver-library" class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Driver Library</a>
            </div>
          </details>
          <a href="/assessment" class="text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Take assessment</a>
          <details class="nav-popover relative">
            <summary class="inline-flex cursor-pointer items-center justify-center rounded-lg p-2 text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)] transition-colors" aria-label="Open account menu">
              <i data-lucide="settings-2" class="w-5 h-5"></i>
            </summary>
            <div class="absolute right-0 top-full mt-3 w-56 rounded-2xl border border-[var(--ap-border)] bg-white/95 p-2 shadow-lg backdrop-blur-sm">
              <span id="header-coach-link" class="hidden"><a href="/coach" class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Coach Dashboard</a></span>
              <span id="header-admin-link" class="hidden"><a href="/admin" class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Admin Dashboard</a></span>
              <a href="/settings" class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Settings</a>
              <button type="button" id="logout-btn" class="block w-full rounded-xl px-3 py-2.5 text-left text-sm font-semibold text-[var(--ap-muted)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-primary)]">Log out</button>
            </div>
          </details>
        </div>
        <button type="button" id="nav-hamburger-btn" class="nav-hamburger hidden p-2 -mr-2 rounded-lg text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] transition-colors" aria-label="Open menu" aria-expanded="false" aria-controls="nav-hamburger-panel">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>
  <div id="nav-hamburger-backdrop" class="nav-hamburger-backdrop fixed inset-0 bg-black/30 z-[100] md:hidden" aria-hidden="true"></div>
  <div id="nav-hamburger-panel" class="nav-hamburger-panel fixed top-0 right-0 bottom-0 w-72 max-w-[85vw] bg-white shadow-xl z-[101] md:hidden overflow-y-auto" role="dialog" aria-label="Navigation menu" aria-modal="true">
    <div class="p-4 flex items-center justify-between border-b border-[var(--ap-border)]">
      <span class="font-semibold text-[var(--ap-primary)]">Menu</span>
      <button type="button" id="nav-hamburger-close" class="p-2 -mr-2 rounded-lg text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] transition-colors" aria-label="Close menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <nav class="p-4 flex flex-col gap-1">
      <div class="flex items-center justify-between py-3 px-3 border-b border-[var(--ap-border)] mb-2">
        <span class="text-sm font-semibold text-[var(--ap-primary)]">Theme</span>
        <button type="button" id="theme-toggle-mobile" class="p-2 rounded-lg text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] transition-colors" aria-label="Toggle dark mode">
          <i data-lucide="sun" id="theme-icon-light-mobile" class="w-5 h-5 hidden"></i>
          <i data-lucide="moon" id="theme-icon-dark-mobile" class="w-5 h-5"></i>
        </button>
      </div>
      <span id="header-coach-link-mobile" class="hidden"><a href="/coach" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Coach</a></span>
      <span id="header-admin-link-mobile" class="hidden"><a href="/admin" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Admin</a></span>
      <a href="/settings" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Settings</a>
      <span id="header-6c-link-mobile" class="hidden"><a href="/scorecard" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">6C's Scorecard</a></span>
      <div class="mt-2 border-t border-[var(--ap-border)] pt-3">
        <p class="px-3 pb-2 text-xs font-semibold uppercase tracking-[0.24em] text-[var(--ap-muted)]">Explore</p>
        <a href="/portal/archetype-library" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-accent)] bg-[var(--ap-bg)]">Archetype Library</a>
        <a href="/portal/driver-library" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Driver Library</a>
      </div>
      <a href="/assessment" class="block py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-primary)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-accent)]">Take Assessment</a>
      <button type="button" id="logout-btn-mobile" class="block w-full text-left py-3 px-3 rounded-lg text-sm font-semibold text-[var(--ap-muted)] hover:bg-[var(--ap-bg)] hover:text-[var(--ap-primary)]">Log out</button>
    </nav>
  </div>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:py-10">
    <div id="loading" class="rounded-3xl border border-[var(--ap-border)] surface px-6 py-10 text-center text-[var(--ap-muted)] shadow-sm">
      Loading your archetype library...
    </div>
    <div id="auth-error" class="hidden rounded-3xl border border-red-300 bg-red-50/90 px-6 py-5 text-sm text-red-700 shadow-sm"></div>
    <div id="page-content" class="hidden space-y-8"></div>
  </main>

  <script type="module">
    (async function() {
      function updateThemeIcons() {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        var lightIcon = document.getElementById('theme-icon-light');
        var darkIcon = document.getElementById('theme-icon-dark');
        if (lightIcon) lightIcon.classList.toggle('hidden', !dark);
        if (darkIcon) darkIcon.classList.toggle('hidden', dark);
      }

      function toggleTheme() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try {
          localStorage.setItem('ap-theme', next);
          document.cookie = 'ap-theme=' + next + '; path=/; max-age=31536000; domain=.alignedpower.coach';
        } catch (error) {}
        updateThemeIcons();
      }

      async function loadConfig() {
        try {
          var response = await fetch('/api/config');
          if (!response.ok) return { error: 'fetch_failed' };
          var text = await response.text();
          eval(text);
          if (!window.SUPABASE_URL) return { error: 'empty_config' };
          return {};
        } catch (error) {
          return { error: 'fetch_failed' };
        }
      }

      updateThemeIcons();
      var themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
      var themeToggleMobile = document.getElementById('theme-toggle-mobile');
      if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

      var loadingEl = document.getElementById('loading');
      var authErrorEl = document.getElementById('auth-error');
      var pageContentEl = document.getElementById('page-content');
      var cfg = await loadConfig();

      if (cfg.error === 'fetch_failed' || cfg.error === 'empty_config') {
        if (loadingEl) loadingEl.classList.add('hidden');
        authErrorEl.textContent = cfg.error === 'fetch_failed'
          ? 'Portal config could not be loaded. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel and redeploy.'
          : 'Supabase URL is not set. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel and redeploy.';
        authErrorEl.classList.remove('hidden');
        return;
      }

      var createClient = (await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm')).createClient;
      var supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var sessionResult = await supabase.auth.getSession();
      var session = sessionResult.data.session;

      if (!session) {
        if (loadingEl) loadingEl.classList.add('hidden');
        authErrorEl.textContent = 'You need to log in to view the Archetype Library.';
        authErrorEl.classList.remove('hidden');
        setTimeout(function() {
          window.location.href = '/login';
        }, 1200);
        return;
      }

      var email = (session.user.email || '').trim().toLowerCase();
      var latestResults = null;
      var header = document.getElementById('portal-header');
      var clientResult = await supabase
        .from('portal_active_clients')
        .select('active_client')
        .eq('email', email)
        .maybeSingle();
      var isActiveClient = !!(clientResult.data && clientResult.data.active_client);

      if (email === 'jacob@alignedpower.coach') {
        var coachEl = document.getElementById('header-coach-link');
        if (coachEl) coachEl.classList.remove('hidden');
        var adminEl = document.getElementById('header-admin-link');
        if (adminEl) adminEl.classList.remove('hidden');
        var coachMobile = document.getElementById('header-coach-link-mobile');
        if (coachMobile) coachMobile.classList.remove('hidden');
        var adminMobile = document.getElementById('header-admin-link-mobile');
        if (adminMobile) adminMobile.classList.remove('hidden');
        if (header) header.setAttribute('data-nav-role', 'admin');
      } else if (header && isActiveClient) {
        header.setAttribute('data-nav-role', 'client');
      }
      if (isActiveClient) {
        var scorecardLink = document.getElementById('header-6c-link');
        if (scorecardLink) scorecardLink.classList.remove('hidden');
        var scorecardMobile = document.getElementById('header-6c-link-mobile');
        if (scorecardMobile) scorecardMobile.classList.remove('hidden');
      }

      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function() {
          await supabase.auth.signOut();
          window.location.href = '/login';
        });
      }
      var logoutMobile = document.getElementById('logout-btn-mobile');
      if (logoutMobile) {
        logoutMobile.addEventListener('click', async function() {
          await supabase.auth.signOut();
          window.location.href = '/login';
        });
      }
      (function initHamburger() {
        var btn = document.getElementById('nav-hamburger-btn');
        var panel = document.getElementById('nav-hamburger-panel');
        var backdrop = document.getElementById('nav-hamburger-backdrop');
        var closeBtn = document.getElementById('nav-hamburger-close');
        function open() { if (panel) panel.classList.add('nav-open'); if (backdrop) backdrop.classList.add('nav-open'); if (btn) { btn.setAttribute('aria-expanded', 'true'); btn.setAttribute('aria-label', 'Close menu'); } document.body.style.overflow = 'hidden'; }
        function close() { if (panel) panel.classList.remove('nav-open'); if (backdrop) backdrop.classList.remove('nav-open'); if (btn) { btn.setAttribute('aria-expanded', 'false'); btn.setAttribute('aria-label', 'Open menu'); } document.body.style.overflow = ''; }
        if (btn) btn.addEventListener('click', function() { panel.classList.contains('nav-open') ? close() : open(); });
        if (backdrop) backdrop.addEventListener('click', close);
        if (closeBtn) closeBtn.addEventListener('click', close);
      })();

      if (email) {
        var rowResult = await supabase
          .from('vapi_results')
          .select('results, created_at')
          .eq('email', email)
          .order('created_at', { ascending: false })
          .limit(1);

        if (rowResult.data && rowResult.data.length) {
          latestResults = rowResult.data[0].results || null;
        }
      }

      var rendered = window.VAPI_ARCHETYPE_LIBRARY.buildPage({
        results: latestResults,
        takeAssessmentHref: '/assessment',
        programHref: 'https://jakesebok.com/work-with-me',
        driverLibraryHref: '/portal/driver-library',
        sidebarTopClass: 'top-24'
      });

      pageContentEl.innerHTML = rendered.html;
      window.VAPI_ARCHETYPE_LIBRARY.populateSections(
        document.getElementById('archetype-library-sections'),
        rendered.currentArchetype,
        '/portal/driver-library'
      );

      if (loadingEl) loadingEl.classList.add('hidden');
      pageContentEl.classList.remove('hidden');
      lucide.createIcons();
    })();
  </script>
</body>
</html>
