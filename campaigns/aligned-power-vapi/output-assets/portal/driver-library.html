<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/portal/theme-init.js"></script>
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Library | Aligned Performance Portal</title>
  <meta name="description" content="Explore the 9 internal driver patterns behind founder behavior inside the Aligned Performance Portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/html/vapi-drivers.js"></script>
  <script src="/html/vapi-driver-library.js"></script>
  <style>
    :root {
      --ap-primary: #0E1624;
      --ap-secondary: #3A4A5C;
      --ap-accent: #FF6B1A;
      --ap-bg: #F5F7FA;
      --ap-text: #0E1624;
      --ap-muted: #7A8FA8;
      --ap-border: #DDE3ED;
      --ap-surface: #ffffff;
      --ap-header-bg: rgba(255,255,255,0.95);
    }
    [data-theme="dark"] {
      --ap-primary: #e8eaf2;
      --ap-secondary: #b8c4d4;
      --ap-accent: #FF6B1A;
      --ap-bg: #161b26;
      --ap-text: #e8eaf2;
      --ap-muted: #8a9bb3;
      --ap-border: #2d3849;
      --ap-surface: #1e2438;
      --ap-header-bg: rgba(30,36,56,0.95);
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(165deg, var(--ap-bg) 0%, color-mix(in srgb, var(--ap-primary) 6%, var(--ap-bg)) 35%, color-mix(in srgb, var(--ap-accent) 5%, var(--ap-bg)) 100%);
      background-attachment: fixed;
      color: var(--ap-text);
      min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: -0.02em; }
    html { scroll-behavior: smooth; }
    .surface { background: var(--ap-surface); }
  </style>
</head>
<body class="min-h-screen antialiased">
  <header class="sticky top-0 z-20 border-b border-[var(--ap-border)] bg-[var(--ap-header-bg)] backdrop-blur-sm">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4">
      <div class="flex items-center gap-3">
        <a href="/dashboard" class="text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">← Back to dashboard</a>
        <span class="hidden text-[var(--ap-muted)] sm:inline">Driver Library</span>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" id="theme-toggle" class="rounded-lg p-2 text-[var(--ap-primary)] hover:bg-[var(--ap-bg)]" aria-label="Toggle theme">
          <i data-lucide="sun" id="theme-icon-light" class="hidden h-5 w-5"></i>
          <i data-lucide="moon" id="theme-icon-dark" class="h-5 w-5"></i>
        </button>
        <a href="/assessment" class="hidden text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)] sm:inline">Retake assessment</a>
        <button type="button" id="logout-btn" class="text-sm font-semibold text-[var(--ap-muted)] hover:text-[var(--ap-primary)]">Log out</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:py-10">
    <div id="loading" class="rounded-3xl border border-[var(--ap-border)] surface px-6 py-10 text-center text-[var(--ap-muted)] shadow-sm">
      Loading your driver library...
    </div>
    <div id="auth-error" class="hidden rounded-3xl border border-red-300 bg-red-50/90 px-6 py-5 text-sm text-red-700 shadow-sm"></div>
    <div id="page-content" class="hidden space-y-8"></div>
  </main>

  <script type="module">
    (async function() {
      function updateThemeIcons() {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        var lightIcon = document.getElementById('theme-icon-light');
        var darkIcon = document.getElementById('theme-icon-dark');
        if (lightIcon) lightIcon.classList.toggle('hidden', !dark);
        if (darkIcon) darkIcon.classList.toggle('hidden', dark);
      }

      function toggleTheme() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try {
          localStorage.setItem('ap-theme', next);
          document.cookie = 'ap-theme=' + next + '; path=/; max-age=31536000; domain=.alignedpower.coach';
        } catch (error) {}
        updateThemeIcons();
      }

      async function loadConfig() {
        try {
          var response = await fetch('/api/config');
          if (!response.ok) return { error: 'fetch_failed' };
          var text = await response.text();
          eval(text);
          if (!window.SUPABASE_URL) return { error: 'empty_config' };
          return {};
        } catch (error) {
          return { error: 'fetch_failed' };
        }
      }

      updateThemeIcons();
      var themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.addEventListener('click', toggleTheme);

      var loadingEl = document.getElementById('loading');
      var authErrorEl = document.getElementById('auth-error');
      var pageContentEl = document.getElementById('page-content');
      var cfg = await loadConfig();

      if (cfg.error === 'fetch_failed' || cfg.error === 'empty_config') {
        if (loadingEl) loadingEl.classList.add('hidden');
        authErrorEl.textContent = cfg.error === 'fetch_failed'
          ? 'Portal config could not be loaded. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel and redeploy.'
          : 'Supabase URL is not set. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel and redeploy.';
        authErrorEl.classList.remove('hidden');
        return;
      }

      var { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm');
      var supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var sessionResult = await supabase.auth.getSession();
      var session = sessionResult.data.session;

      if (!session) {
        if (loadingEl) loadingEl.classList.add('hidden');
        authErrorEl.textContent = 'You need to log in to view the Driver Library.';
        authErrorEl.classList.remove('hidden');
        setTimeout(function() {
          window.location.href = '/login';
        }, 1200);
        return;
      }

      var logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function() {
          await supabase.auth.signOut();
          window.location.href = '/login';
        });
      }

      var email = (session.user.email || '').trim().toLowerCase();
      var latestResults = null;

      if (email) {
        var rowResult = await supabase
          .from('vapi_results')
          .select('results, created_at')
          .eq('email', email)
          .order('created_at', { ascending: false })
          .limit(1);

        if (rowResult.data && rowResult.data.length) {
          latestResults = rowResult.data[0].results || null;
        }
      }

      var rendered = window.VAPI_DRIVER_LIBRARY.buildPage({
        results: latestResults,
        takeAssessmentHref: '/assessment',
        programHref: 'https://jakesebok.com/work-with-me',
        archetypeLibraryHref: '/portal/archetype-library'
      });

      pageContentEl.innerHTML = rendered.html;
      window.VAPI_DRIVER_LIBRARY.populateSections(
        document.getElementById('driver-library-sections'),
        rendered.primaryDriver,
        rendered.secondaryDriver,
        rendered.isAlignedMomentum
      );

      if (loadingEl) loadingEl.classList.add('hidden');
      pageContentEl.classList.remove('hidden');
      lucide.createIcons();
    })();
  </script>
</body>
</html>
