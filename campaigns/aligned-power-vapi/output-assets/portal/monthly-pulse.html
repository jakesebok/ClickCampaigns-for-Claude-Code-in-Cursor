<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/portal/theme-init.js"></script>
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Monthly Domain Pulse | Aligned Performance Portal</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0E1624">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
  <style>
    :root{--ap-primary:#0E1624;--ap-secondary:#3A4A5C;--ap-accent:#FF6B1A;--ap-bg:#F5F7FA;--ap-text:#0E1624;--ap-muted:#7A8FA8;--ap-border:#DDE3ED;--ap-surface:#ffffff;}
    [data-theme="dark"]{--ap-primary:#e8eaf2;--ap-secondary:#b8c4d4;--ap-bg:#161b26;--ap-text:#e8eaf2;--ap-muted:#8a9bb3;--ap-border:#2d3849;--ap-surface:#1e2438;}
    [data-theme="dark"] .bg-white{background-color:var(--ap-surface)!important;}
    body{font-family:'Cormorant Garamond',serif;font-weight:600;background:linear-gradient(165deg,var(--ap-bg) 0%,color-mix(in srgb,#0E1624 5%,var(--ap-bg)) 50%);background-attachment:fixed;color:var(--ap-text);min-height:100vh;}
    h1,h2,h3{font-family:'Outfit',sans-serif;font-weight:800;letter-spacing:-0.02em;}
    .card{box-shadow:0 1px 0 0 rgba(255,255,255,0.6) inset,0 4px 6px -1px rgba(0,0,0,0.04),0 14px 28px -8px rgba(14,22,36,0.12);border-left:3px solid var(--ap-accent);}
    .domain-row{display:grid;grid-template-columns:110px 1fr 70px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--ap-border);}
    .domain-row:last-child{border-bottom:none;}
    .slider{width:100%;}
    .score-badge{font-family:'Outfit',sans-serif;font-weight:700;text-align:right;color:var(--ap-accent);}
    .tabs{display:flex;gap:8px;margin-bottom:20px;}
    .tab{padding:8px 16px;border:2px solid var(--ap-border);border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;background:var(--ap-surface);}
    .tab.active{background:var(--ap-primary);color:#fff;border-color:var(--ap-primary);}
  </style>
</head>
<body class="min-h-screen antialiased">
  <header class="border-b-2 border-[var(--ap-accent)]/30 bg-white/95 backdrop-blur-sm sticky top-0 z-10 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/dashboard" class="inline-flex items-center gap-2.5 font-semibold text-[var(--ap-primary)]"><img src="../images/favicon.svg" alt="" class="h-8 sm:h-9 w-auto"><span>Aligned Performance Portal</span></a>
      <a href="/dashboard" class="text-sm font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Dashboard</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <div id="loading" class="text-center py-12 text-[var(--ap-muted)]">Loading…</div>
    <div id="content" class="hidden">
      <p class="uppercase text-xs tracking-wider font-semibold text-[var(--ap-accent)] mb-1">Monthly pulse</p>
      <h1 class="text-3xl text-[var(--ap-primary)] mb-2">Where have the twelve domains moved this month?</h1>
      <p class="text-[var(--ap-secondary)] mb-6">Ten minutes. Twelve sliders. Two passes: score, then importance. This bridges your quarterly reassessment.</p>

      <div class="tabs" id="pulse-tabs">
        <button type="button" class="tab active" data-tab="score">Score (1 low — 10 high)</button>
        <button type="button" class="tab" data-tab="importance">Importance (1–10)</button>
      </div>

      <form id="pulse-form">
        <div class="card bg-white rounded-2xl p-6 mb-6">
          <div id="pane-score" class="domain-pane"></div>
          <div id="pane-importance" class="domain-pane hidden"></div>
        </div>

        <div class="card bg-white rounded-2xl p-6 mb-6">
          <label class="block text-sm font-semibold text-[var(--ap-primary)] mb-2">Notes (optional)</label>
          <textarea id="notes" rows="3" maxlength="2000" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-[var(--ap-surface)] text-[var(--ap-text)] focus:border-[var(--ap-accent)] focus:outline-none"></textarea>
        </div>

        <button type="submit" id="submit-btn" class="inline-flex items-center justify-center gap-2 bg-[var(--ap-accent)] hover:bg-[#e55a0f] text-white font-semibold py-3 px-6 rounded-lg shadow-sm">Save monthly pulse</button>
      </form>

      <div id="delta-state" class="hidden mt-8 card bg-white rounded-2xl p-6">
        <h3 class="text-xl text-[var(--ap-primary)] mb-3">What moved since your last full assessment</h3>
        <div id="delta-content"></div>
        <a href="/dashboard" class="mt-4 inline-flex text-sm font-semibold text-[var(--ap-accent)]">Back to dashboard →</a>
      </div>
    </div>
  </main>

  <script type="module">
    const DOMAINS = [
      { code:'PH', name:'Physical Health' }, { code:'IA', name:'Inner Alignment' }, { code:'ME', name:'Mental & Emotional' }, { code:'AF', name:'Attention & Focus' },
      { code:'RS', name:'Relationship to Self' }, { code:'FA', name:'Family' }, { code:'CO', name:'Community' }, { code:'WI', name:'World & Impact' },
      { code:'VS', name:'Vision & Strategy' }, { code:'EX', name:'Execution' }, { code:'OH', name:'Operational Health' }, { code:'EC', name:'Ecology' },
    ];

    (async function() {
      const configRes = await fetch('/api/config');
      eval(await configRes.text());
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm');
      const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '/login?redirect=' + encodeURIComponent('/monthly-pulse'); return; }
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York';

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      const scores = {};
      const importance = {};
      DOMAINS.forEach(d => { scores[d.code] = 6; importance[d.code] = 6; });

      function renderPane(target, valueMap, pane) {
        pane.innerHTML = '';
        DOMAINS.forEach(d => {
          const row = document.createElement('div');
          row.className = 'domain-row';
          row.innerHTML = `
            <div>
              <div class="text-sm font-semibold text-[var(--ap-primary)]">${d.code}</div>
              <div class="text-xs text-[var(--ap-muted)]">${d.name}</div>
            </div>
            <input type="range" min="1" max="10" step="1" value="${valueMap[d.code]}" class="slider" data-code="${d.code}" />
            <div class="score-badge" data-badge="${d.code}">${valueMap[d.code]}</div>`;
          const slider = row.querySelector('input');
          const badge = row.querySelector('[data-badge]');
          slider.addEventListener('input', () => { valueMap[d.code] = Number(slider.value); badge.textContent = slider.value; });
          pane.appendChild(row);
        });
      }
      renderPane('score', scores, document.getElementById('pane-score'));
      renderPane('importance', importance, document.getElementById('pane-importance'));

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const which = tab.dataset.tab;
          document.getElementById('pane-score').classList.toggle('hidden', which !== 'score');
          document.getElementById('pane-importance').classList.toggle('hidden', which !== 'importance');
        });
      });

      document.getElementById('pulse-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        const r = await fetch('/api/monthly-pulse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body: JSON.stringify({ domain_scores: scores, importance_ratings: importance, notes: document.getElementById('notes').value.trim(), timezone: tz }),
        });
        if (!r.ok) { submitBtn.disabled = false; submitBtn.textContent = 'Save monthly pulse'; alert('Error. Try again.'); return; }
        const j = await r.json();
        const delta = j.pulse && j.pulse.delta_vs_last_full;
        document.getElementById('pulse-form').classList.add('hidden');
        const state = document.getElementById('delta-state');
        state.classList.remove('hidden');
        const content = document.getElementById('delta-content');
        if (!delta) { content.innerHTML = '<p class="text-[var(--ap-secondary)]">Save complete. Your first pulse will anchor future deltas.</p>'; return; }
        const rows = Object.entries(delta.domain_deltas || {}).map(([k, v]) => {
          const arrow = v > 0.1 ? '↑' : v < -0.1 ? '↓' : '→';
          const color = v > 0.1 ? '#16a34a' : v < -0.1 ? '#dc2626' : 'var(--ap-muted)';
          return `<div class="flex items-center justify-between py-1 border-b border-[var(--ap-border)]"><span class="text-sm">${k}</span><span class="text-sm font-semibold" style="color:${color}">${arrow} ${v > 0 ? '+' : ''}${v}</span></div>`;
        }).join('');
        content.innerHTML = `
          <p class="text-sm text-[var(--ap-secondary)] mb-3">Overall composite delta: <strong>${delta.composite_delta != null ? (delta.composite_delta > 0 ? '+' : '') + delta.composite_delta : '—'}</strong></p>
          <div class="text-sm">${rows}</div>`;
      });
    })();
  </script>
</body>
</html>
