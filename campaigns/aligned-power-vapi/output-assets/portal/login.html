<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | Aligned Performance Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --ap-primary: #0E1624;
      --ap-secondary: #3A4A5C;
      --ap-accent: #FF6B1A;
      --ap-bg: #F5F7FA;
      --ap-text: #0E1624;
      --ap-muted: #7A8FA8;
      --ap-border: #DDE3ED;
    }
    body { font-family: 'Cormorant Garamond', serif; font-weight: 600; background: linear-gradient(165deg, var(--ap-bg) 0%, color-mix(in srgb, #0E1624 5%, var(--ap-bg)) 40%, color-mix(in srgb, #FF6B1A 4%, var(--ap-bg)) 100%); background-attachment: fixed; color: var(--ap-text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: -0.02em; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <main class="max-w-md mx-auto px-4 pt-16 pb-12">
    <div class="text-center mb-8">
      <a href="dashboard.html" class="inline-block mb-4">
        <img src="../images/logo-jake-sebok-horizontal.png" alt="Jake Sebok" class="h-12 sm:h-14 w-auto mx-auto" />
      </a>
      <h1 class="text-3xl text-[var(--ap-primary)] mb-2">Aligned Performance Portal</h1>
      <p class="text-[var(--ap-secondary)]">Log in to view your VAPI™ results and history.</p>
    </div>
    <div class="bg-white rounded-2xl border border-[var(--ap-border)] shadow-lg p-6 sm:p-8 border-l-4 border-l-[var(--ap-accent)]">
      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-[var(--ap-primary)] mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" class="w-full px-4 py-3 rounded-lg border-2 border-[var(--ap-border)] bg-white focus:border-[var(--ap-primary)] focus:outline-none">
        </div>
        <p id="login-error" class="text-sm text-red-600 hidden"></p>
        <button type="submit" class="w-full bg-[var(--ap-accent)] hover:bg-[#e55a0f] text-white font-semibold py-3 px-4 rounded-[100px] transition-colors">
          Log in
        </button>
      </form>
      <p class="text-sm text-[var(--ap-muted)] mt-6 text-center">
        Don’t have an account? <a href="signup.html" id="signup-link" class="font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Sign up</a>
      </p>
    </div>
    <p class="text-center mt-6">
      <a href="../html/vapi-landing.html" class="text-sm text-[var(--ap-muted)] hover:text-[var(--ap-primary)]">← Back to assessment</a>
    </p>
  </main>
  <script type="module">
    (async function() {
      async function loadConfig() {
        try {
          var r = await fetch('/api/config');
          if (!r.ok) return { error: 'fetch_failed' };
          var t = await r.text();
          eval(t);
          if (!window.SUPABASE_URL) return { error: 'empty_config' };
          return {};
        } catch (e) {
          return { error: 'fetch_failed' };
        }
      }
      var errEl = document.getElementById('login-error');
      var cfg = await loadConfig();
      if (cfg.error === 'fetch_failed') {
        errEl.textContent = 'Portal config could not be loaded. If you run this site: set Vercel Root Directory to the folder that contains the api folder, add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables, then redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      if (cfg.error === 'empty_config') {
        errEl.textContent = 'Supabase URL is not set. Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel → Settings → Environment Variables and redeploy.';
        errEl.classList.remove('hidden');
        return;
      }
      var { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm');
      var supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect') || '';
      var allowedRedirects = ['dashboard.html', 'admin.html', 'settings.html', 'six-c-scorecard.html'];
      var redirectTo = allowedRedirects.indexOf(redirect) !== -1 ? redirect : 'dashboard.html';

      var session = await supabase.auth.getSession();
      if (session.data.session) {
        window.location.href = redirectTo;
        return;
      }
      var emailParam = params.get('email');
      if (emailParam) document.getElementById('email').value = emailParam;
      var signupLink = document.getElementById('signup-link');
      if (signupLink && emailParam) signupLink.href = 'signup.html?email=' + encodeURIComponent(emailParam);
      document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errEl = document.getElementById('login-error');
        errEl.classList.add('hidden');
        var { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          errEl.textContent = error.message || 'Log in failed.';
          errEl.classList.remove('hidden');
          return;
        }
        window.location.href = redirectTo;
      });
    })();
  </script>
</body>
</html>
