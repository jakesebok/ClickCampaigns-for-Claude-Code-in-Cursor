<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="/portal/theme-init.js"></script>
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email confirmed | Aligned Performance Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --ap-primary: #0E1624;
      --ap-secondary: #3A4A5C;
      --ap-accent: #FF6B1A;
      --ap-bg: #F5F7FA;
      --ap-text: #0E1624;
      --ap-muted: #7A8FA8;
      --ap-border: #DDE3ED;
    }
    [data-theme="dark"]{--ap-primary:#e8eaf2;--ap-secondary:#b8c4d4;--ap-accent:#FF6B1A;--ap-bg:#161b26;--ap-text:#e8eaf2;--ap-muted:#8a9bb3;--ap-border:#2d3849;--ap-surface:#1e2438;}
    [data-theme="dark"] .bg-white{background-color:var(--ap-surface)!important;}
    body { font-family: 'Cormorant Garamond', serif; font-weight: 600; background: linear-gradient(165deg, var(--ap-bg) 0%, color-mix(in srgb, #0E1624 5%, var(--ap-bg)) 40%, color-mix(in srgb, #FF6B1A 4%, var(--ap-bg)) 100%); background-attachment: fixed; color: var(--ap-text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 700; letter-spacing: -0.02em; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <main class="max-w-md mx-auto px-4 pt-16 pb-12">
    <div class="text-center mb-8">
      <a href="/dashboard" class="inline-block mb-4">
        <img src="../images/logo-jake-sebok-horizontal.png" alt="Jake Sebok" class="h-12 sm:h-14 w-auto mx-auto" />
      </a>
      <h1 class="text-3xl text-[var(--ap-primary)] mb-2">Email confirmed</h1>
      <p class="text-[var(--ap-secondary)]">Your account is ready. You can now log in to your portal.</p>
    </div>
    <div class="bg-white rounded-2xl border border-[var(--ap-border)] shadow-lg p-6 sm:p-8 text-center">
      <p id="message" class="text-[var(--ap-secondary)]">Redirecting you to log in…</p>
      <p class="mt-4">
        <a href="/login" class="font-semibold text-[var(--ap-primary)] hover:text-[var(--ap-accent)]">Log in now</a> if you’re not redirected.
      </p>
    </div>
    <p class="text-center mt-6">
      <a href="/assessment" class="text-sm text-[var(--ap-muted)] hover:text-[var(--ap-primary)]">← Back to assessment</a>
    </p>
  </main>
  <script type="module">
    (function() {
      var hash = window.location.hash ? window.location.hash.slice(1) : '';
      var params = new URLSearchParams(hash || window.location.search);
      var errorDesc = params.get('error_description');
      var msgEl = document.getElementById('message');
      if (errorDesc) {
        msgEl.textContent = errorDesc;
        msgEl.classList.add('text-red-600');
        return;
      }
      setTimeout(function() {
        window.location.href = '/login';
      }, 2500);
    })();
  </script>
</body>
</html>
